# ─── Server Configuration ─────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# All controllers are mapped under /api so frontend proxy (localhost:5173) works:
# Frontend: vite.config.js proxies /api → http://localhost:8080/api

spring.application.name=Learnova

# ─── Database Configuration (PostgreSQL) ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-small-flower-a1jxu002-pooler.ap-southeast-1.aws.neon.tech/learnova?sslmode=require&channel_binding=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_HYbLMOGBZ4S7}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

#Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

#GitHub OAuth2 Configuration
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email

# ─── JWT Configuration ────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:WmNQd2dLQjVCcWJ6VkQ4eG5qK2wybXh3bDNUeUxGQ2JkN0ZwNENxWT0=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ─── Multipart File Upload Configuration ──────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ─── Logging Configuration ────────────────────────────────────────────────────
logging.level.lms.learnova=DEBUG
logging.level.org.springframework.security=INFO