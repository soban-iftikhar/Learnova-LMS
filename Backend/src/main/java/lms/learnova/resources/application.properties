# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# IMPORTANT: all controllers are mapped under /api so the frontend proxy works.
# Frontend vite.config.js proxies  /api  →  http://localhost:8080/api
server.servlet.context-path=/api

# ─── Database (PostgreSQL — adjust credentials as needed) ────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/learnova
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Generate a strong 256-bit Base64 key for production.
# Example (run once):  openssl rand -base64 32
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBsZWFybm92YQ==
app.jwt.expiration-ms=3600000
# 7 days refresh token
app.jwt.refresh-expiration-ms=604800000

# ─── Multipart file upload ────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.lms.learnova=DEBUG
logging.level.org.springframework.security=WARN
